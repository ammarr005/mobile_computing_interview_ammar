name: interviewai
description: A Flutter frontend migrated from a prototype repo.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.5
  flutter_riverpod: ^2.4.0
  go_router: ^8.0.0
  dio: ^5.4.0
  shared_preferences: ^2.2.2
  intl: ^0.20.2
  firebase_core: ^4.0.0
  firebase_auth: ^6.0.0
  cloud_firestore: ^6.0.0
  flutter_dotenv: ^5.1.0
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
